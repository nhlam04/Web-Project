services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: iam
      MYSQL_USER: admin
      MYSQL_PASSWORD: password123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infrastructure/db:/docker-entrypoint-initdb.d:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: microservices_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d microservices_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongodb:
    image: mongo:latest
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping && rabbitmq-diagnostics -q check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  iam-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: npm --workspace iam-service start
    environment:
      PORT: 3001
      DB_HOST: mysql
      DB_USER: admin
      DB_PASS: password123
      DB_NAME: iam
      JWT_SECRET: local-dev-jwt-secret-change-me-1234567890
      JWT_REFRESH_SECRET: local-dev-refresh-secret-change-me-1234567890
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      ALLOWED_ORIGINS: http://localhost:8080,http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  catalog-service:
    build: ./catalog_chat
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://admin:password123@mysql:3306/catalog
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      RABBITMQ_EXCHANGE: cnweb.events
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  ordering-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: npm --workspace ordering-service start
    environment:
      PORT: 8083
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASS: password123
      DB_NAME: microservices_db
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      RABBITMQ_EXCHANGE: cnweb.events
      IAM_BASE_URL: http://iam-service:3001
      CATALOG_BASE_URL: http://catalog-service:8000
      ORDERING_AUTH_REQUIRED: "false"
      ALLOWED_ORIGINS: http://localhost:8080,http://localhost:3000
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  fulfillment-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: npm run dev:fulfillment
    environment:
      PORT: 3002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: admin
      DB_PASSWORD: password123
      DB_NAME: fulfillment
      TYPEORM_SYNCHRONIZE: "true"
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      EVENT_EXCHANGE: cnweb.events
    ports:
      - "3002:3002"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3002/fulfillments/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  review-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: npm run dev:review
    environment:
      PORT: 3003
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: admin
      DB_PASSWORD: password123
      DB_NAME: review
      TYPEORM_SYNCHRONIZE: "true"
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      EVENT_EXCHANGE: cnweb.events
    ports:
      - "3003:3003"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3003/reviews/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: npm --workspace notification-service start
    environment:
      PORT: 8086
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASS: password123
      DB_NAME: microservices_db
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      RABBITMQ_EXCHANGE: cnweb.events
      IAM_BASE_URL: http://iam-service:3001
      NOTIFICATION_AUTH_REQUIRED: "false"
      ALLOWED_ORIGINS: http://localhost:8080,http://localhost:3000
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_ORDERING_URL: /api/ordering
        VITE_CATALOG_URL: /api/catalog
        VITE_AUTH_URL: /api/auth
        VITE_FULFILLMENT_URL: /api/fulfillment
        VITE_NOTIFICATION_URL: /api/notification
        VITE_REVIEW_URL: /api/reviews
    ports:
      - "3000:80"

  api-gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./infrastructure/api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      iam-service:
        condition: service_started
      catalog-service:
        condition: service_started
      ordering-service:
        condition: service_started
      fulfillment-service:
        condition: service_healthy
      review-service:
        condition: service_healthy
      notification-service:
        condition: service_started

volumes:
  mysql-data:
  postgres-data:
  mongodb-data:
