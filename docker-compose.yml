services:
  # 1. Database MySQL 
  mysql-server:
    image: mysql:8.0
    container_name: web-project-mysql-server-1
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    ports:
      - "3306:3306"
    volumes:
      - ./infrastructure/db:/docker-entrypoint-initdb.d:z
    command: --default-authentication-plugin=mysql_native_password

  # 2. Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  # 3. IAM Service
  iam-service:
    build: ./backend/apps/iam-service
    container_name: web-project-iam-service-1
    depends_on:
      - mysql-server
      - rabbitmq
    environment:
      - DB_HOST=mysql-server
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}

  # 4. API Gateway
  api-gateway:
    image: nginx:alpine
    container_name: web-project-api-gateway-1
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/api-gateway/html:/usr/share/nginx/html:ro  
    depends_on:
      - iam-service