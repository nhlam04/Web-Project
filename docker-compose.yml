services:
  # 1. Database MySQL (Thay thế Postgres)
  mysql-server:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: admin
      MYSQL_PASSWORD: password123
    ports:
      - "3306:3306"
    volumes:
      - ./infrastructure/db:/docker-entrypoint-initdb.d:z
    command: --default-authentication-plugin=mysql_native_password
  # 2. Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  # 3. IAM Service
  iam-service:
    build: 
      context: ./services/iam-service
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=mysql-server
      - DB_USER=admin
      - DB_PASS=password123
      - DB_NAME=iam  # Trỏ đích danh vào database iam
    depends_on:
      - mysql-server

  # 4. API Gateway
  api-gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/api-gateway/nginx.conf:/etc/nginx/nginx.conf:z
    depends_on:
      - iam-service