server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;
  resolver 127.0.0.11 ipv6=off valid=30s;

  location /api/catalog/ {
    set $catalog_upstream catalog-service:8000;
    rewrite ^/api/catalog/(.*)$ /$1 break;
    proxy_pass http://$catalog_upstream;
  }

  location /api/ordering/ {
    set $ordering_upstream ordering-service:8083;
    rewrite ^/api/ordering/(.*)$ /$1 break;
    proxy_pass http://$ordering_upstream;
  }

  location /api/auth/ {
    set $iam_upstream iam-service:3001;
    rewrite ^/api/auth/(.*)$ /$1 break;
    proxy_pass http://$iam_upstream;
  }

  location /api/fulfillment/ {
    set $fulfillment_upstream fulfillment-service:3002;
    rewrite ^/api/fulfillment/(.*)$ /$1 break;
    proxy_pass http://$fulfillment_upstream;
  }

  location /api/notification/ {
    set $notification_upstream notification-service:8086;
    rewrite ^/api/notification/(.*)$ /$1 break;
    proxy_pass http://$notification_upstream;
  }

  location / {
    try_files $uri /index.html;
  }
}
